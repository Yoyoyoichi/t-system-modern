<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>HTML5</title>
</head>
<style type="text/css">
    h1, p {
    text-align: center;
    }

    #btn {
    display: flex;
    justify-content: center;
    }

    #btn div {
    font-size: 25px;
    line-height: 1em;
    background: #eee;
    border: 2px solid #ccc;
    border-radius: 10px;
    text-align: center;
    width: 90px;
    padding: 30px 0;
    display: block;
    margin: 0 10px;
    drop-shadow: 10px;
    }

    #btn div:hover {
    opacity: 0.7;
    cursor: pointer;
    }
</style>
<body>
    <h1>マリオイントロ</h1>
    <div id="btn">
    <div id="play">Play</div>
    </div>

    <p>※注：音が出ます！</p>
<script src="Tone.js"></script>
<script type="text/javascript">
    //DOM
    const btn = document.getElementById("btn");
    const play = document.getElementById("play");

    //メロディ
    //イントロ
    const melodyLine = [
    'E5', 'E5', null, 'E5', 
    null, 'C5', 'E5', null,
    'G5', null, null, null,
    'G4', null, null,  null,
    ]
    
    //再生ボタン
    play.addEventListener("click", function () { 

    //音源
    var synth = new Tone.Synth().toMaster();
    
    //8分音符で再生
    function setPlay(time, note) { synth.triggerAttackRelease(note,'4n');
    }


    //メロディをセット  
    const melody = new Tone.Sequence(setPlay, melodyLine); 

    //メロディ再生
    melody.start();
    
    //ループ回数
    melody.loop = 0; 

    //テンポ
    Tone.Transport.bpm.value = 120;
    
    //再生実行
    Tone.Transport.start(); 

    }, false);
</script>
</body>
</html>
