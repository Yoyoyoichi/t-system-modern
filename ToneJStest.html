<!doctype html>
<html>
 <head>
 <meta charset="utf-8">
 </head>
 <style type="text/css">
    h1, p {
    text-align: center;
    }

    #btn {
    display: flex;
    justify-content: center;
    }

    #btn div {
    font-size: 25px;
    line-height: 1em;
    background: #eee;
    border: 2px solid #ccc;
    border-radius: 10px;
    text-align: center;
    width: 90px;
    padding: 30px 0;
    display: block;
    margin: 0 10px;
    drop-shadow: 10px;
    }

    #btn div:hover {
    opacity: 0.7;
    cursor: pointer;
    }
</style>
 <body>
    <h1>マリオBGM</h1>
    <div id="btn">
    <div id="play">Play</div>
    <div id="stop">Stop</div>
    </div>

    <p>※注：音が出ます！</p>
 <script src="Tone.js"></script>
 <script>
    //DOM
    const btn = document.getElementById("btn");
    const play = document.getElementById("play");
    const stop = document.getElementById("stop");

    //STOPボタン非表示
    stop.style.display = "none"; 

    //メロディ
    //イントロ
    const intro = [
    'E5', 'E5', null, 'E5', 
    null, 'C5', 'E5', null,
    'G5', null, null, null,
    'G4', null, null,  null,
    ]

    //Aメロ
    const A1 = [
    'c5',null, null,'G4',
    null, null,'E4', null,
    null, 'A4', null, 'B4',
    null, 'A#4', 'A4', null,
    ]
    const A2 = [
    'G4', 'C5', 'E5', 'A5',
    null, 'F5', null, 'G5',
    null, 'E5', null, 'C5',
    'D5', 'B4', null, null,
    ]

    //Bメロ
    const B1 = [
    null, null,'G5', 'F#5', 
    'F5', 'D5#', null,'E5',  
    null, 'G4', 'A4', 'C5', 
    null, 'A4', 'C5', 'D5',
    ] 
    const B2 = [
    null, null, 'G5', 'F#5', 
    'F5', 'D5', null, 'E5', 
    null, 'C6', null, 'C6',
    'C6',  null, null, null,
    ]
    const B3 = [
    null, null, 'D#5', null, 
    null, 'D5', null, null, 
    'C5', null, null, null,
    null,  null, null, null,
    ]

    //Cメロ
    const C1 = [
    'C5', 'C5', null, 'C5',
    null, 'C5', 'D5', null,
    'E5', 'C5', null, 'A4',
    'G4', null, null, null,
    ] 
    const C2 = [
    'C5', 'C5', null, 'C5',
    null, 'C5', 'D5', 'E5',
    null, null, null, null,
    null, null, null, null,
    ]

    //Dメロ
    const D1 = [
    'E5','C5',null,'G4',
    null,null,'G#4',null,
    'A4','F5',null,'F5',
    'A4',null,null,null,
    ]
    const D2 = [
    'B4','A5',null,'A5',
    'A5','G5', null,'F5',
    'E5','C5',null,'A4',
    'G4',null,null,null,
    ]
    const D3 = [
    'B4','F5',null,'F5',
    'F5','E5', null,'D5',
    'C5',null,null,null,
    null,null,null,null,
    ]

    //曲構成
    var melodyLine = 
    //イントロ  
    intro.concat(
    //Aメロ
    A1, A2, A1, A2, 
    //Bメロ
    B1, B2, B1, B3, 
    B1, B2, B1, B3, 
    //Cメロ
    C1, C2, C1, intro, 
    //Aメロ
    A1, A2, A1, A2, 
    //Dメロ
    D1, D2, D1, D3, 
    D1, D2, D1, D3, 
    //Cメロ
    C1, C2, C1,
    );

    //音源オプション
    const option = {
    envelope: {
        attack: 0.05,
        decay: 3,
        sustain: 0.5,
        release: 3,
    },
    portamento: 0.1,
    volume: -20,
    } 

    //再生ボタン
    play.addEventListener("click", function () { 

    //ボタン表示切替
    play.style.display = "none"; 
    stop.style.display = "block"; 

    //音源
    const synth = new Tone.MonoSynth(option).toMaster(); 
    
    //8分音符で再生
    function setPlay(time, note) { synth.triggerAttackRelease(note,'8n', time);
    }

    //メロディをセット  
    const melody = new Tone.Sequence(setPlay, melodyLine); 

    //メロディ再生
    melody.start();

    //ループ回数
    melody.loop = 5; 

    //テンポ
    Tone.Transport.bpm.value = 400;
    
    //再生実行
    Tone.Transport.start(); 

    }, false);


    //停止ボタン
    stop.addEventListener("click", function () { 
    
    //ボタン表示切替
    stop.style.display = "none"; 
    play.style.display = "block"; 

    //停止実行
    Tone.Transport.stop();
    //イベントクリア
    Tone.Transport.cancel();

    }, false);
 </script>
 </body>
</html>
