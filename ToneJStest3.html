<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>HTML5</title>
</head>
<style type="text/css">
    h1, p {
    text-align: center;
    }

    #btn {
    display: flex;
    justify-content: center;
    }

    #btn div {
    font-size: 25px;
    line-height: 1em;
    background: #eee;
    border: 2px solid #ccc;
    border-radius: 10px;
    text-align: center;
    width: 90px;
    padding: 30px 0;
    display: block;
    margin: 0 10px;
    drop-shadow: 10px;
    }

    #btn div:hover {
    opacity: 0.7;
    cursor: pointer;
    }
</style>
<body>
    <h1>マリオゲームオーバー</h1>
    <div id="btn">
       <div id="play">Play</div>
       <div id="stop">Stop</div>
    </div>
    
    <p>※注：音が出ます！</p>
<script src="Tone.js"></script>
<script type="text/javascript">
const btn = document.getElementById("btn");
const play = document.getElementById("play");
const stop = document.getElementById("stop");

//STOPボタン非表示
stop.style.display = "none"; 

//メロディ
const melodyLine = [
  {'time': '0:0:0', 'note': 'c5', 'duration': ' 16n'},
  {'time': '0:1:0', 'note': 'c5', 'duration': ' 16n'},
  {'time': '0:2:0', 'note': 'c5', 'duration': ' 16n'},
  {'time': '0:3:0', "note": 'G4', 'duration': '16n'},
  {'time': '1:2:0', "note": 'E4', 'duration': '16n'}
];

//再生ボタン
play.addEventListener("click", function () { 

//ボタン表示切替
play.style.display = "none"; 
stop.style.display = "block"; 
  
//音源
const synth = new Tone.AMSynth().toMaster(); 
 
//再生設定
function setPlay(time, note) { synth.triggerAttackRelease(note.note, note.duration, time);}

//メロディをセット  
const melody = new Tone.Part(setPlay, melodyLine); 

//メロディ再生
melody.start();

//ループ（デフォルトでfalse）
melody.loop = true;
melody.loopStart = "0";
melody.loopEnd = "16";
  
//テンポ
Tone.Transport.bpm.value = 100;
  
//再生実行
Tone.Transport.start(); 

}, false);


//停止ボタン
stop.addEventListener("click", function () { 
 
//ボタン表示切替
stop.style.display = "none"; 
play.style.display = "block"; 
  
//停止実行
Tone.Transport.stop();
//イベントクリア
Tone.Transport.cancel();

}, false);
</script>
</body>
</html>
