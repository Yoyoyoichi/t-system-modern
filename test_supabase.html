<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Supabase 直接通信テスト</title>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h2>Supabase 直接通信テスト画面</h2>
    <p>ブラウザから直接Supabase（データベース）にアクセスできるかテストします。</p>

    <div>
        <label>Supabase URL:</label><br>
        <input type="text" id="supabaseUrl" style="width: 400px;" placeholder="https://xxxx.supabase.co"><br><br>
        
        <label>Supabase anon key:</label><br>
        <input type="password" id="supabaseKey" style="width: 400px;" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."><br><br>
        
        <button onclick="testConnection()">通信テスト開始！</button>
    </div>

    <hr>
    <h3>結果：</h3>
    <pre id="result" style="background: #f4f4f4; padding: 10px; border: 1px solid #ccc;"></pre>

    <script>
        async function testConnection() {
            const url = document.getElementById('supabaseUrl').value.trim();
            const key = document.getElementById('supabaseKey').value.trim();
            const resultDiv = document.getElementById('result');

            if (!url || !key) {
                resultDiv.innerText = "エラー: URLとanon keyを入力してください。";
                return;
            }

            resultDiv.innerText = "接続中...";

            try {
                // Supabaseクライアントの初期化
                const supabase = supabase.createClient(url, key);

                // テストとして、Terashima01テーブルから1件だけ取得してみる
                const { data, error } = await supabase
                    .from('Terashima01')
                    .select('question, answer')
                    .limit(1);

                if (error) {
                    throw error;
                }

                resultDiv.innerText = "✅ 接続大成功！爆速でデータが取れました！\n\n取得データ:\n" + JSON.stringify(data, null, 2);
                
            } catch (error) {
                resultDiv.innerText = "❌ 接続失敗:\n" + error.message;
            }
        }
    </script>
</body>
</html>
