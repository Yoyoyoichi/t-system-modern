<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Supabase 直接通信テスト</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h2>Supabase 直接通信テスト画面</h2>
    <p>ブラウザから直接Supabase（データベース）にアクセスできるかテストします。</p>

    <div>
        <label>Supabase URL:</label><br>
        <input type="text" id="supabaseUrl" style="width: 400px;" value="https://eqtxzxqvkprnmkiyczvv.supabase.co" readonly><br><br>
        
        <label>Supabase Publishable key (元 anon key):</label><br>
        <input type="text" id="supabaseKey" style="width: 500px;" value="sb_publishable_L9iiPiRICnSt60jLa_xT9A_dgTphJ2e" readonly><br><br>
        
        <button onclick="testConnection()" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">通信テスト開始！</button>
    </div>

    <hr>
    <h3>結果：</h3>
    <pre id="result" style="background: #f4f4f4; padding: 10px; border: 1px solid #ccc; white-space: pre-wrap; word-wrap: break-word;"></pre>

    <script>
        async function testConnection() {
            const url = document.getElementById('supabaseUrl').value.trim();
            const key = document.getElementById('supabaseKey').value.trim();
            const resultDiv = document.getElementById('result');

            resultDiv.innerText = "接続中...";

            try {
                const supabaseClient = supabase.createClient(url, key);

                // PostgreSQLは大文字小文字を区別するため、小文字でテストします
                const { data, error } = await supabaseClient
                    .from('terashima01')
                    .select('question, answer')
                    .limit(1);

                if (error) {
                    throw error;
                }

                resultDiv.innerText = "✅ 接続大成功！ブラウザから直接爆速でデータが取れました！\n\n取得データ:\n" + JSON.stringify(data, null, 2);
                
            } catch (error) {
                resultDiv.innerText = "❌ 接続失敗:\n" + error.message;
            }
        }
    </script>
</body>
</html>
